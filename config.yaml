# ↓↓↓ 上线后必须改成你的真实地址！本地预览阶段先保持这样也行 ↓↓↓
baseURL: "https://Lyan1639.github.io/"
locale: "zh-cn"
theme: "hugo-theme-stack"
title: "Lyan"                  # 网站标题，改成你的
copyright: "© 2026 liuyan"     # 底部版权

# 自定义分类法
taxonomies:
  category: categories
  tag: tags
  series: series

# 分页：每页显示几篇文章
pagination:
  pagerSize: 5

# 相关文章推荐配置（按标签权重匹配）
related:
  includeNewer: true
  indices:
    - name: tags
      weight: 80
    - name: keywords
      weight: 50
    - name: date
      weight: 10
  threshold: 1
  toLower: false

# Stack 主题的核心配置
params:
  mainSections:
    - post                     # 首页展示 content/post 目录下的文章

  # 左侧个人信息卡片
  sidebar:
    subtitle: "记录、分享、成长"   # 头像下的一句话简介
    avatar: img/avatar.svg       # 头像 SVG

  # 文章封面等图片处理
  article:
    math: false
    toc: true                    # 文章内显示目录
    readingTime: true            # 显示阅读时长
    list:
      showTags: true             # 列表页显示标签

  # 右侧小部件
  widgets:
    page:
      - type: toc                # 文章页右侧显示目录

  # 评论：先关掉，玩熟了再看第十一节接入 giscus
  comments:
    enabled: false

# 顶部/侧边菜单
menu:
  social:                        # 社交链接（显示在个人卡片下）
    - identifier: github
      name: GitHub
      url: "https://github.com/Lyan1639"
      params:
        icon: brand-github

  main:                          # 主菜单（DeepSeek 风格）
    - identifier: home
      name: 首页
      url: /
      weight: 1
      params:
        icon: home
    - identifier: series
      name: 系列文集
      url: /series/
      weight: 2
      params:
        icon: hash
    - identifier: bookmarks
      name: 我的收藏
      url: /page/bookmarks/
      weight: 3
      params:
        icon: tag

# 让文章摘要、代码高亮等更好看
markup:
  goldmark:
    renderer:
      unsafe: true               # 允许 Markdown 里写 HTML
  highlight:
    noClasses: false